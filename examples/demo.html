<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="description" content="FrontLens demo page" />
    <title>用户管理</title>
    <style>
      body {
        font-family: system-ui, sans-serif;
        padding: 24px;
      }
      .breadcrumb,
      form,
      table,
      .pagination {
        margin-bottom: 16px;
      }
      th,
      td {
        border: 1px solid #ddd;
        padding: 8px 12px;
      }
      table {
        border-collapse: collapse;
      }
      .primary {
        color: #fff;
        background: #1677ff;
      }
      .danger {
        color: #b42318;
      }
    </style>
  </head>
  <body>
    <nav class="breadcrumb">
      <span>系统管理</span>
      <span> / </span>
      <span>用户管理</span>
    </nav>

    <h1>用户管理</h1>

    <form class="ant-form">
      <label>
        用户名
        <input name="name" placeholder="请输入用户名" />
      </label>
      <button type="button">搜索</button>
      <button type="reset">重置</button>
    </form>

    <button class="primary">新增用户</button>

    <table class="ant-table">
      <thead>
        <tr>
          <th>用户名</th>
          <th>角色</th>
          <th>操作</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Alice</td>
          <td>管理员</td>
          <td><button class="danger">删除</button></td>
        </tr>
      </tbody>
    </table>

    <div class="ant-pagination">
      <button>上一页</button>
      <button>下一页</button>
    </div>

    <img src="missing.png" />

    <script>
      console.warn('demo warning');
      fetch('/api/users?page=1&pageSize=10').catch((error) => console.error('fetch failed', error.message));
    </script>
  </body>
</html>
